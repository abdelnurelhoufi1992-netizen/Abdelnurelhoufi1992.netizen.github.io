<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamVision - Demo Streaming Platform</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family: 'Arial', sans-serif; }
    body { background-color:#141414; color:#fff; }
    a { text-decoration:none; color:inherit; }
    header { display:flex; justify-content:space-between; align-items:center; padding:20px; background:#1f1f1f; }
    header h1 { font-size:24px; color:#e50914; }
    nav a { margin-left:20px; font-weight:bold; transition:0.3s; }
    nav a:hover { color:#e50914; }
    .hero { position:relative; height:60vh; background:url('https://via.placeholder.com/1200x600') center/cover no-repeat; display:flex; align-items:center; justify-content:center; }
    .hero h2 { font-size:48px; background:rgba(0,0,0,0.5); padding:10px 20px; border-radius:5px; }
    section { padding:40px 20px; }
    section h3 { font-size:28px; margin-bottom:20px; color:#e50914; }
    .slider { display:flex; overflow-x:auto; gap:15px; }
    .card { min-width:200px; background:#222; border-radius:8px; overflow:hidden; flex-shrink:0; transition:0.3s; }
    .card img { width:100%; display:block; }
    .card h4 { padding:10px; font-size:18px; }
    .card:hover { transform:scale(1.05); }
    footer { text-align:center; padding:20px; background:#1f1f1f; margin-top:40px; font-size:14px; color:#888; }
  </style>
</head>
<body>
  <header>
    <h1>StreamVision</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Films</a>
      <a href="#">Series</a>
      <a href="#">Categorieën</a>
      <a href="#">Contact</a>
    </nav>
  </header>
  <div class="hero">
    <h2>Welkom bij StreamVision</h2>
  </div>
  <section>
    <h3>Populaire Films</h3>
    <div class="slider">
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Film+1" alt="Film 1"><h4>Film 1</h4></div>
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Film+2" alt="Film 2"><h4>Film 2</h4></div>
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Film+3" alt="Film 3"><h4>Film 3</h4></div>
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Film+4" alt="Film 4"><h4>Film 4</h4></div>
    </div>
  </section>
  <section>
    <h3>Populaire Series</h3>
    <div class="slider">
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Serie+1" alt="Serie 1"><h4>Serie 1</h4></div>
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Serie+2" alt="Serie 2"><h4>Serie 2</h4></div>
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Serie+3" alt="Serie 3"><h4>Serie 3</h4></div>
      <div class="card"><img src="https://via.placeholder.com/200x300?text=Serie+4" alt="Serie 4"><h4>Serie 4</h4></div>
    </div>
  </section>
  <footer>
    &copy; 2026 StreamVision Demo. Alle rechten voorbehouden.
  </footer>
</body>
</html>
